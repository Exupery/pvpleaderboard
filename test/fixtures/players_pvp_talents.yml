<%
  specs_list = [
    [62, 8], [63, 8], [64, 8], [65, 2], [66, 2], [70, 2],
    [71, 1], [72, 1], [73, 1], [102, 11], [103, 11], [104, 11],
    [105, 11], [250, 6], [251, 6], [252, 6], [253, 3], [254, 3],
    [255, 3], [256, 5], [257, 5], [258, 5], [259, 4], [260, 4],
    [261, 4], [262, 7], [263, 7], [264, 7], [265, 9], [266, 9],
    [267, 9], [268, 10], [269, 10], [270, 10], [577, 12], [581, 12],
    [1467, 13], [1468, 13]
  ]
  # PVP talent IDs per spec: 62→0-11, 63→12-23, 64→24-35, 65→36-47, 66→48-59
  pvp_spec_ids = { 62 => 0, 63 => 12, 64 => 24, 65 => 36, 66 => 48 }
%>
<% 256.times do |p| %>
  <% spec_id = specs_list[p % 38][0] %>
  <% pvp_base = pvp_spec_ids[spec_id] %>
  <% if pvp_base %>
    <% 12.times do |n| %>
  ppvp_<%= p %>_<%= n %>:
    player_id: <%= p %>
    pvp_talent_id: <%= pvp_base + n %>
    stale: "false"
    <% end %>
  <% end %>
<% end %>
